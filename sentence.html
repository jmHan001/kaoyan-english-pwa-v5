<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>拾词 · 长难句</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="memory.css">
<link rel="stylesheet" href="enhancements.css">
<script src="theme.js" defer></script>
</head>
<body>
<main class="shell">
<header class="topbar">
<div class="brand">拾词 <small>长难句拆分</small>
</div>
<nav class="nav">
<a href="index.html">学习</a>
<a href="vocabulary.html">词库</a>
<a aria-current="page" href="sentence.html">长难句</a>
<a href="reading.html">阅读</a>
<a href="sync.html">同步</a>
</nav>
</header>
<section class="panel">
<h1>把长句，拆成能读懂的小段。</h1>
<label class="sentence-label" for="contextInput">ChatGPT 聊天上下文</label>
<textarea class="field" id="contextInput" rows="5" style="width:100%" placeholder="复制当前授权聊天窗口里的内容，或点“从剪贴板读取”。这里只保存你主动导入的内容。">
</textarea>
<div class="toolbar" style="margin-top:12px">
<button class="btn secondary" id="readClipboard">从剪贴板读取</button>
<button class="btn secondary" id="extractSentences">提取英文长句</button>
<button class="btn secondary" id="clearContext">清空上下文</button>
</div>
<div id="importNotice" class="notice hidden"></div>
<div id="candidates" class="sentence-candidates hidden"></div>
<label class="sentence-label" for="input">当前长难句</label>
<textarea class="field" id="input" rows="6" style="width:100%" placeholder="粘贴英文长句">
</textarea>
<div class="toolbar" style="margin-top:12px">
<button class="btn" id="analyze">开始拆分</button>
<button class="btn secondary" id="saveAnalysis">保存长难句和解析</button>
<button class="btn secondary" id="sample">填入示例</button>
</div>
</section>
<section class="panel" style="margin-top:16px">
<div class="notice">绿色高考 · 蓝色考研 · 紫色共有 · 红色未收录。点击单词查看详情。</div>
<div id="segments" class="passage">
<div class="empty">输入句子后开始分析</div>
</div>
</section>
<section class="panel" style="margin-top:16px">
<div class="toolbar">
<h2 style="margin:0;flex:1">已保存长难句</h2>
<button class="btn secondary" id="clearHistory">清空历史</button>
</div>
<div id="history" class="sentence-history">
<div class="empty">还没有保存记录</div>
</div>
</section>
</main>
<div class="modal hidden" id="modal">
<div class="modal-card">
<button class="iconbtn" style="float:right" id="close">×</button>
<h2 id="mword">
</h2>
<p id="mmeaning">
</p>
<div class="toolbar">
<button class="btn secondary" data-voice="en-US">美音</button>
<button class="btn secondary" data-voice="en-GB">英音</button>
<button class="btn" id="add">加入今日学习池</button>
</div>
</div>
</div>
<script type="module" src="sentence.js?v=5.6.6">
</script>
</body>
</html>
