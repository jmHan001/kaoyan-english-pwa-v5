<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>拾词 · 长难句</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="memory.css">
<link rel="stylesheet" href="enhancements.css">
<link rel="stylesheet" href="interactive-english.css?v=5.6.11">
<script src="theme.js" defer></script>
</head>
<body>
<main class="shell">
<header class="topbar">
<div class="brand">拾词 <small>长难句拆分</small>
</div>
<nav class="nav">
<a href="index.html">学习</a>
<a href="vocabulary.html">词库</a>
<a aria-current="page" href="sentence.html">长难句</a>
<a href="reading.html">阅读</a>
<a href="sync.html">同步</a>
</nav>
</header>
<section class="panel">
<h1>把长句，拆成能读懂的小段。</h1>
<div class="toolbar" style="margin-top:12px">
<button class="btn" id="importClipboard">从剪贴板导入</button>
<button class="btn secondary" id="openSavedSentences">已存句子 <span id="savedSentenceCount">0</span></button>
<button class="btn secondary" id="clearImport">清空导入内容</button>
<button class="btn secondary" id="copyGptTemplate">复制 GPT 输出模板</button>
<button class="btn secondary" id="sample">填入示例</button>
</div>
<div id="importNotice" class="notice hidden"></div>
<div id="duplicateNotice" class="notice hidden"></div>
<div class="sentence-form">
<label class="sentence-label" for="sentenceNumber">句子编号</label>
<input class="field" id="sentenceNumber" placeholder="Exercise 1 - Sentence 03">
<label class="sentence-label" for="source">来源</label>
<input class="field" id="source" placeholder="2011 英语二完形">
<label class="sentence-label" for="originalSentence">原句</label>
<textarea class="field" id="originalSentence" rows="5" placeholder="英文完整句子"></textarea>
<label class="sentence-label" for="readingOrder">阅读顺序</label>
<textarea class="field" id="readingOrder" rows="5" placeholder="按原文阅读推进写出理解顺序；保留英文短语和对应中文意思"></textarea>
<label class="sentence-label" for="chunks">意群切分</label>
<textarea class="field" id="chunks" rows="5" placeholder="1. 第一意群&#10;2. 第二意群"></textarea>
<label class="sentence-label" for="mainClause">句子主干</label>
<textarea class="field" id="mainClause" rows="3" placeholder="主语 + 谓语 + 宾语"></textarea>
<label class="sentence-label" for="structureAnalysis">句子结构</label>
<textarea class="field" id="structureAnalysis" rows="6" placeholder="- 时间状语：&#10;- 定语从句："></textarea>
<label class="sentence-label" for="vocabulary">核心词汇</label>
<textarea class="field" id="vocabulary" rows="4" placeholder="- word：中文释义"></textarea>
<label class="sentence-label" for="translation">参考翻译</label>
<textarea class="field" id="translation" rows="4" placeholder="完整中文译文"></textarea>
<label class="sentence-label" for="grammarNotes">语法笔记</label>
<textarea class="field" id="grammarNotes" rows="5" placeholder="1. 知识点"></textarea>
<label class="sentence-label" for="fixedExpressions">固定搭配</label>
<textarea class="field" id="fixedExpressions" rows="4" placeholder="- expression = 中文含义"></textarea>
<label class="sentence-label" for="userMistakes">个人易错点</label>
<textarea class="field" id="userMistakes" rows="5" placeholder="- 错误：&#10;  正确：&#10;  原因："></textarea>
<label class="sentence-label" for="testResult">毕业测试</label>
<input class="field" id="testResult" placeholder="得分：8/10">
<label class="sentence-label" for="masteryStatus">掌握状态</label>
<input class="field" id="masteryStatus" placeholder="completed">
<label class="sentence-label" for="unrecognized">未识别内容</label>
<textarea class="field" id="unrecognized" rows="4" placeholder="无法识别的内容会放在这里"></textarea>
</div>
<div class="toolbar" style="margin-top:12px">
<button class="btn secondary" id="previewImport">解析预览</button>
<button class="btn" id="saveAnalysis">保存</button>
</div>
</section>
<section class="panel" style="margin-top:16px">
<div class="notice">绿色高考 · 蓝色考研 · 紫色共有 · 红色未收录。点击单词查看详情。</div>
<div id="previewPanel" class="sentence-preview hidden"></div>
<div id="segments" class="passage">
<div class="empty">输入句子后开始分析</div>
</div>
</section>
<section class="panel" style="margin-top:16px">
<div class="toolbar">
<h2 style="margin:0;flex:1">已保存长难句</h2>
<button class="btn secondary" id="clearHistory">清空历史</button>
</div>
<div id="history" class="sentence-history">
<div class="empty">还没有保存记录</div>
</div>
</section>
</main>
<div class="modal hidden" id="modal">
<div class="modal-card">
<button class="iconbtn" style="float:right" id="close">×</button>
<h2 id="mword">
</h2>
<p id="mmeaning">
</p>
<div class="toolbar">
<button class="btn secondary" data-voice="en-US">美音</button>
<button class="btn secondary" data-voice="en-GB">英音</button>
<button class="btn" id="add">加入今日学习池</button>
</div>
</div>
</div>
<div class="modal hidden" id="duplicateModal">
<div class="modal-card">
<h2>该长难句可能已经存在。</h2>
<p id="duplicateText"></p>
<div class="toolbar">
<button class="btn secondary" id="viewDuplicate">查看已有记录</button>
<button class="btn" id="overwriteForm">覆盖表单内容</button>
<button class="btn secondary" id="cancelImport">取消导入</button>
</div>
</div>
</div>
<div class="modal hidden" id="savedSentencesModal">
<div class="modal-card">
<button class="iconbtn" style="float:right" id="closeSavedSentences">×</button>
<h2>已存句子</h2>
<p class="muted" id="savedSentencesMeta">按保存时间排序</p>
<div id="savedSentenceList" class="sentence-history">
<div class="empty">还没有保存记录</div>
</div>
</div>
</div>
<script type="module" src="sentence.js?v=5.6.16">
</script>
</body>
</html>
