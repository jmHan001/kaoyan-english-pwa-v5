<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fbfaf8">
<title>拾词 · 今日学习</title>
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="memory.css">
<link rel="stylesheet" href="enhancements.css?v=5.6.25">
<link rel="stylesheet" href="choices.css?v=6.0.0">
<link rel="stylesheet" href="interactive-english.css?v=5.6.17">
<link rel="stylesheet" href="premium-theme.css?v=6.0.0">
<script src="theme.js?v=6.0.0" defer></script>
<script type="module" src="app.js?v=6.0.0">
</script>
</head>
<body>
<main class="shell home-shell">
<header class="topbar">
<div class="brand">拾词 <small>从高考到考研</small>
</div>
<nav class="nav">
<a aria-current="page" href="index.html">首页</a>
<a href="vocabulary.html">词库</a>
<a href="sentence.html">长难句</a>
<a href="reading.html">阅读</a>
<a href="sync.html">同步</a>
</nav>
</header>
<section class="home-hero">
<span class="home-eyebrow" id="homeStreak">连续学习</span>
<h1>拾词成句<br>积句成章</h1>
</section>
<section class="panel home-task-panel">
<div class="today-task" id="todayTask" aria-live="polite">
<div class="today-task-copy">
<span>今日背词</span>
<strong id="todayCount">0/0</strong>
<small id="todayRemaining">正在读取学习池</small>
</div>
<div class="today-actions"><a class="btn accent today-start" href="study.html?mode=today">继续背词</a><button class="btn secondary hidden" id="restoreTodayTask" type="button">恢复今日完成</button></div>
<progress id="todayProgress" value="0" max="1" aria-label="今日任务完成进度"></progress>
</div>
</section>
<section class="panel home-action-list" aria-label="今日学习安排">
<button class="home-action-row" id="reviewBtn" type="button">
<span class="home-action-icon" aria-hidden="true">↻</span><span class="home-action-label">到期复习</span><strong class="home-action-count" id="homeDueCount">0</strong><span class="home-action-arrow">›</span>
</button>
<button class="home-action-row" id="wrongBtn" type="button">
<span class="home-action-icon" aria-hidden="true">×</span><span class="home-action-label">错词回炉</span><strong class="home-action-count" id="homeWrongCount">0</strong><span class="home-action-arrow">›</span>
</button>
<button class="home-action-row" id="quizBtn" type="button">
<span class="home-action-icon" aria-hidden="true">✓</span><span class="home-action-label">单词小测</span><strong class="home-action-count">测</strong><span class="home-action-arrow">›</span>
</button>
</section>
<details class="home-tools">
<summary>学习设置与更多功能</summary>
<div class="toolbar">
<select id="mode" class="field">
<option value="smart">智能衔接</option>
<option value="gaokao">高考基础</option>
<option value="kaoyan">考研模式</option>
</select>
<select id="daily" class="field">
<option>10</option>
<option selected>20</option>
<option>30</option>
<option>50</option>
<option value="custom">自定义…</option>
</select>
<button class="btn secondary" id="poolBtn">编辑学习池</button>
<button class="btn secondary" id="favoriteBtn">重点词表</button>
<button class="btn secondary" id="learnedBtn">学习记录</button>
<a class="sync-pill" id="syncStatus" href="sync.html">同步状态读取中</a>
</div>
<div class="home-more-links" aria-label="更多学习模块">
<a class="btn secondary" href="reading.html">阅读理解</a>
<a class="btn secondary" href="lookup.html">查词</a>
<a class="btn secondary" href="exam.html">真题训练</a>
</div>
</details>
<div class="home-hidden-stats"><div class="statgrid" id="stats"></div></div>
<section class="home-support">
<div class="acceptance-panel" id="acceptancePanel" aria-live="polite"></div>
<div class="notice hidden" id="done">今天的新词已完成。可以进入到期复习，或编辑学习池。</div>
<div class="notice hidden" id="reviewNotice"></div>
<div class="after-task hidden" id="afterTask" aria-live="polite"></div>
</section>
</main>
<div class="modal hidden" id="poolModal">
<div class="modal-card">
<div class="toolbar">
<h2 style="margin:0;flex:1">今日学习池</h2>
<button class="btn secondary" id="fillPool">自动补满</button>
<button class="iconbtn" id="closePool" aria-label="关闭">×</button>
</div>
<div class="list" id="poolList">
</div>
<div class="toolbar" style="margin-top:16px">
<input class="field" id="addWord" placeholder="输入词库中的单词">
<button class="btn" id="addWordBtn">加入</button>
</div>
</div>
</div>
<div class="modal hidden" id="wrongModal">
<div class="modal-card">
<div class="toolbar">
<div style="flex:1">
<h2 style="margin:0">错词回炉</h2>
<small id="wrongMeta">读取错词中</small>
</div>
<button class="iconbtn" id="closeWrong" aria-label="关闭">×</button>
</div>
<div class="notice" id="wrongHint">从所有错过的单词里随机抽取一组重温。</div>
<div class="wrong-grid">
<button class="btn secondary" data-wrong-count="10">随机 10 个</button>
<button class="btn secondary" data-wrong-count="20">随机 20 个</button>
<button class="btn secondary" data-wrong-count="50">随机 50 个</button>
<button class="btn" data-wrong-count="all">全部错词</button>
</div>
<div class="list" id="wrongList"></div>
</div>
</div>
<div class="modal hidden" id="favoriteModal">
<div class="modal-card">
<div class="toolbar">
<div style="flex:1">
<h2 style="margin:0">重点词表</h2>
<small id="favoriteMeta">用户手动收藏的单词</small>
</div>
<button class="iconbtn" id="closeFavorite" aria-label="关闭">×</button>
</div>
<div class="toolbar">
<button class="btn secondary" id="reviewFavorites">重点重温</button>
</div>
<div class="list" id="favoriteList"></div>
</div>
</div>
<div class="modal hidden" id="learnedModal">
<div class="modal-card">
<div class="toolbar">
<div style="flex:1">
<h2 style="margin:0">学习记录</h2>
<small id="learnedMeta">读取学习历史中</small>
</div>
<button class="iconbtn" id="closeLearned" aria-label="关闭">×</button>
</div>
<div class="tabs" id="learnedTabs">
<button class="btn active" data-learned-view="learning">学习中</button>
<button class="btn secondary" data-learned-view="mastered">已掌握</button>
</div>
<div class="toolbar">
<button class="btn secondary" id="reviewLearned">重温当前列表</button>
</div>
<div class="list" id="learnedList"></div>
</div>
</div>
<div class="modal hidden" id="dailyModal">
<div class="modal-card compact-modal">
<h2>今天背多少个？</h2>
<p class="muted">输入 1—300。确认后，今日背词数量会立即同步更新。</p>
<input class="field" id="dailyCustomInput" type="number" min="1" max="300" inputmode="numeric" aria-label="自定义今日背词数量">
<div class="toolbar" style="margin-top:16px">
<button class="btn secondary" id="cancelDaily" type="button">取消</button>
<button class="btn" id="confirmDaily" type="button">确认数量</button>
</div>
</div>
</div>
<div class="modal hidden" id="quizModal">
<div class="modal-card">
<div class="toolbar">
<div style="flex:1">
<h2 style="margin:0">单词小测</h2>
<small id="quizMeta">从今日学习池抽题</small>
</div>
<button class="iconbtn" id="closeQuiz" aria-label="关闭">×</button>
</div>
<div id="quizBody"></div>
</div>
</div>
</body>
</html>
