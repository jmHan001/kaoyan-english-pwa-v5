<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>拾词 · 词库</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="memory.css">
<script src="theme.js" defer></script>
</head>
<body>
<main class="shell">
<header class="topbar">
<div class="brand">拾词 <small>完整词库</small>
</div>
<nav class="nav">
<a href="index.html">学习</a>
<a aria-current="page" href="vocabulary.html">词库</a>
<a href="sentence.html">长难句</a>
<a href="reading.html">阅读</a>
</nav>
</header>
<section class="panel">
<div class="toolbar">
<input class="field" id="search" placeholder="搜索英文或中文" style="flex:1">
<select class="field" id="filter">
<option value="all">全部词库</option>
<option value="gaokao">高考</option>
<option value="kaoyan">考研</option>
<option value="both">共有</option>
</select>
<button class="btn secondary" id="export">导出学习数据</button>
<label class="btn secondary">恢复数据<input id="import" type="file" accept="application/json" hidden>
</label>
</div>
<div class="notice" id="count">加载中</div>
<div class="list" id="list">
</div>
<div class="toolbar" style="justify-content:center;margin-top:18px">
<button class="btn secondary" id="more">再显示 100 个</button>
</div>
</section>
</main>
<script type="module">import{loadVocabulary,allWords,exportAll,importAll}from'./vocabulary-manager.js';let page=1;const $=s=>document.querySelector(s);await loadVocabulary();function render(){const q=$('#search').value.trim().toLowerCase(),f=$('#filter').value;const x=allWords().filter(w=>(f==='all'||w.source===f)&&(w.word.toLowerCase().includes(q)||(w.translation||'').includes(q)));$('#count').textContent=`找到 ${x.length} 个词，当前显示 ${Math.min(x.length,page*100)} 个`;$('#list').innerHTML=x.slice(0,page*100).map(w=>`<div class="row">
<div>
<strong>${w.word}</strong>
<small>${w.translation||''}</small>
</div>
<span class="chip">${w.source==='both'?'共有':w.source==='gaokao'?'高考':'考研'}</span>
</div>`).join('')||'<div class="empty">没有匹配结果</div>'}$('#search').oninput=()=>{page=1;render()};$('#filter').onchange=()=>{page=1;render()};$('#more').onclick=()=>{page++;render()};$('#export').onclick=exportAll;$('#import').onchange=e=>importAll(e.target.files[0]);render();</script>
</body>
</html>
